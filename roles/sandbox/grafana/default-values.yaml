## Pass the plugins you want installed as a list.
##
plugins: []
  # - digrich-bubblechart-panel
  # - grafana-clock-panel
  ## You can also use other plugin download URL, as long as they are valid zip files,
  ## and specify the name of the plugin as prefix, with an version. Like this:
  # - marcusolsson-json-datasource@1.3.24@https://grafana.com/api/plugins/marcusolsson-json-datasource/versions/1.3.24/download

## Configure grafana datasources
## ref: http://docs.grafana.org/administration/provisioning/#datasources
##
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Mimir
        uid: mimir
        type: prometheus
        access: proxy
        url: http://mimir.observe.svc.cluster.local:8080/prometheus
        isDefault: true
        jsonData:
          httpMethod: POST
          prometheusType: Mimir
          timeInterval: 15s

      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki-gateway.observe.svc.cluster.local
        jsonData:
          derivedFields:
            - name: TraceID
              matcherType: label
              matcherRegex: trace_id
              datasourceUid: tempo
              url: '$${__value.raw}'
              urlDisplayLabel: View trace

      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.observe.svc.cluster.local:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
            filterByTraceID: true
            tags:
              - key: service.name
                value: service_name
          tracesToMetrics:
            datasourceUid: mimir
          # Service graph stays empty until a span-metrics source writes to Mimir
          # (no spanmetrics connector / metrics-generator yet). Wiring is here so
          # it works once that exists.
          serviceMap:
            datasourceUid: mimir
          nodeGraph:
            enabled: true

alerting: {}
notifiers: {}

## Configure grafana dashboard providers
## ref: http://docs.grafana.org/administration/provisioning/#dashboards
##
## `path` must be /var/lib/grafana/dashboards/<provider_name>
##
dashboardProviders: {}
#  dashboardproviders.yaml:
#    apiVersion: 1
#    providers:
#    - name: 'default'
#      orgId: 1
#      folder: ''
#      type: file
#      disableDeletion: false
#      editable: true
#      options:
