# roles/.../kube-state-metrics/application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-state-metrics
  namespace: psk-system
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: psk-aws-control-plane-configuration

  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts/
      chart: kube-state-metrics
      targetRevision: 7.2.2
      helm:
        valueFiles:
          - $config/roles/sandbox/kube-state-metrics/default-values.yaml
          - $config/roles/sandbox/kube-state-metrics/sandbox-values.yaml
    - repoURL: https://github.com/twplatformlabs/psk-aws-control-plane-configuration
      targetRevision: HEAD
      ref: config
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
