---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-singleton
  namespace: psk-system
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: psk-aws-control-plane-configuration

  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: open-telemetry/opentelemetry-collector
      targetRevision: 0.158.1
      helm:
        valueFiles:
          - $config/roles/sandbox/otel-singleton/default-values.yaml
          - $config/roles/sandbox/otel-singleton/sandbox-values.yaml
    - repoURL: https://github.com/twplatformlabs/psk-aws-control-plane-configuration
      targetRevision: HEAD
      ref: config
  destination:
    server: https://kubernetes.default.svc
    namespace: observe
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
